name: Build ARM64EC on Linux

on:
  push:
    branches: [ master ] # Adjust to your specific arm64ec development branch
  pull_request:
    branches: [ master ] # Adjust to your specific arm64ec development branch
  workflow_dispatch:

jobs:
  build-arm64ec:
    runs-on: ubuntu-latest # Using 'ubuntu-latest' is generally recommended

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies for arm64ec build
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt update
        sudo apt install -y g++-12-aarch64-linux-gnu mingw-w64-x86-64 llvm-dev libclang-dev

    - name: Create build directory
      run: mkdir build-arm64ec

    - name: Configure arm64ec build
      run: |
        export AR="ar -rcs"
        export AS="as"
        export CC="g++-12-aarch64-linux-gnu"
        export CXX="g++-12-aarch64-linux-gnu"
        export WINDRES="llvm-windres"
        export RC="llvm-windres"
        meson setup -Denable_tests=True -Denable_extras=True --cross-file=build-win64.txt --buildtype release build-arm64ec

    - name: Build arm64ec
      run: ninja -C build-arm64ec

    - name: Upload build artifacts (optional)
      uses: actions/upload-artifact@v4
      with:
        name: vkd3d-proton-arm64ec
        path: build-arm64ec/vkd3d*
